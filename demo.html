<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>对话质量分类演示</title>
<style>
body { font-family: "Microsoft YaHei", sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
h1 { color: #333; }
label { font-weight: bold; display: block; margin: 12px 0 4px; }
textarea { width: 100%; height: 80px; border: 1px solid #ccc; border-radius: 6px; padding: 10px; font-size: 14px; }
button { padding: 10px 24px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; margin: 4px; }
.btn-go { background: #4caf50; color: white; }
.btn-preset { background: #eee; }
.btn-preset:hover { background: #ddd; }
#result { margin-top: 16px; padding: 16px; border-radius: 8px; display: none; }
.useful { background: #e8f5e9; border: 1px solid #66bb6a; }
.useless { background: #fce4ec; border: 1px solid #ef5350; }
#status { padding: 8px; border-radius: 6px; text-align: center; }
.status-ok { background: #e8f5e9; color: #2e7d32; }
.status-err { background: #fce4ec; color: #c62828; }
</style>
</head>
<body>

<h1>对话质量分类演示</h1>
<div id="status">正在检测 API...</div>

<label>用户消息</label>
<textarea id="userInput"></textarea>

<label>助手回复</label>
<textarea id="assistantInput"></textarea>

<div style="margin:12px 0">
  <button class="btn-go" onclick="doPredict()">分析质量</button>
  <button class="btn-preset" onclick="setPreset('good')">专业回答</button>
  <button class="btn-preset" onclick="setPreset('dodge')">敷衍回答</button>
  <button class="btn-preset" onclick="setPreset('wrong')">事实错误</button>
</div>

<div id="result"></div>

<script>
var API = 'http://localhost:8000';

// 检测连接
fetch(API + '/health')
  .then(function(r) { return r.json(); })
  .then(function(d) {
    document.getElementById('status').innerHTML = 'API 已连接 | 模型就绪 | 设备: ' + d.device;
    document.getElementById('status').className = 'status-ok';
  })
  .catch(function() {
    document.getElementById('status').innerHTML = 'API 未连接，请先启动: D:/Python/pycharm/python api_server.py --port 8000';
    document.getElementById('status').className = 'status-err';
  });

function setPreset(type) {
  if (type === 'good') {
    document.getElementById('userInput').value = 'Python 装饰器的原理是什么？';
    document.getElementById('assistantInput').value = '装饰器本质是接受函数作为参数并返回新函数的高阶函数。@decorator 语法是 func = decorator(func) 的语法糖。它常用于日志记录、权限校验、性能计时等横切关注点。';
  } else if (type === 'dodge') {
    document.getElementById('userInput').value = '什么是面向对象编程？';
    document.getElementById('assistantInput').value = '面向对象就是面向对象嘛，它是一种编程思想，嗯...大概有几个特性吧，封装、继承什么的。反正现在大家都在用，你学学就知道了。';
  } else {
    document.getElementById('userInput').value = '太阳系中最大的行星是什么？';
    document.getElementById('assistantInput').value = '太阳系最大的行星是地球。地球的直径大约是 12,742 公里，是太阳系中体积最大的天体。';
  }
}

function doPredict() {
  var user = document.getElementById('userInput').value.trim();
  var assistant = document.getElementById('assistantInput').value.trim();
  if (!user || !assistant) { alert('请先填写内容或点击预设按钮'); return; }

  var text = '用户: ' + user + '\n助手: ' + assistant;
  var resultDiv = document.getElementById('result');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = '分析中...';

  fetch(API + '/predict', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text: text})
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var isGood = data.label === 'useful';
      resultDiv.className = isGood ? 'useful' : 'useless';
      resultDiv.innerHTML =
        '<strong>' + (isGood ? '有用' : '无用') + '</strong> ' +
        '(置信度: ' + (data.confidence * 100).toFixed(0) + '%)';
    })
    .catch(function() {
      resultDiv.className = 'useless';
      resultDiv.innerHTML = '请求失败，请确认 API 是否在运行';
    });
}
</script>
</body>
</html>
